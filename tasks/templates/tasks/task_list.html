

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Task List</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        h1 { color: #333; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .task-card { background: #f9f9f9; padding: 15px; margin: 10px 0; border-radius: 5px; border-left: 5px solid #007bff; }
        .completed { border-left-color: #28a745; text-decoration: line-through; opacity: 0.6; }
    </style>
</head>
<body>

    <h1>My Apex Tasks</h1>
    <form method="post">
        {% csrf_token %}
        <input type = "text" name = "title" placeholder="Task title" required>
        <button type ="submit">Add Task</button>
    </form>

    <!-- Loop through all the tasks passed from our view -->
    {% for task in tasks %}
        <div class="task-card {% if task.is_completed %}completed{% endif %}">
            <h3>{{ task.title }}</h3>
            <p>{{ task.description }}</p>
            <small>Due: {{ task.due_date|default:"No due date" }}</small>
        </div>
    {% empty %}
        <p>No tasks found. Add some in the Admin panel!</p>
    {% endfor %}

</body>
</html>
