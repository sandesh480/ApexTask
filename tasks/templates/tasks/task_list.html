<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ApexTask - Task Manager</title>
</head>
<body>
    <h1>ApexTask</h1>

    <!-- Form to add a new task -->
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Enter a new task..." required>
        <button type="submit">Add Task</button>
    </form>

    <hr>

    <!-- Task List -->
    <ul>
        {% for task in tasks %}
            <li>
                {{ task.title }} 
                <a href="{% url 'delete_task' task.id %}">Delete</a>
            </li>
        {% empty %}
            <li>No tasks yet. Add one above!</li>
        {% endfor %}
    </ul>
</body>
</html>
